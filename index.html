<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الروابط الرسميه</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #f5576c 75%, #4facfe 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 20s infinite;
        }

        .particle:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 15s; }
        .particle:nth-child(2) { left: 20%; animation-delay: 2s; animation-duration: 20s; width: 15px; height: 15px; }
        .particle:nth-child(3) { left: 35%; animation-delay: 4s; animation-duration: 18s; }
        .particle:nth-child(4) { left: 50%; animation-delay: 0s; animation-duration: 22s; width: 8px; height: 8px; }
        .particle:nth-child(5) { left: 65%; animation-delay: 6s; animation-duration: 16s; }
        .particle:nth-child(6) { left: 80%; animation-delay: 3s; animation-duration: 19s; width: 12px; height: 12px; }
        .particle:nth-child(7) { left: 90%; animation-delay: 8s; animation-duration: 21s; }
        .particle:nth-child(8) { left: 5%; animation-delay: 5s; animation-duration: 17s; width: 6px; height: 6px; }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        /* Logo Section */
        .logo-section {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin: 30px 0;
            flex-wrap: wrap;
            animation: fadeInDown 1s ease;
        }

        .logo-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.4s ease;
            animation: pulse 3s infinite;
        }

        .logo-card:nth-child(2) { animation-delay: 0.5s; }
        .logo-card:nth-child(3) { animation-delay: 1s; }

        .logo-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            background: rgba(255, 255, 255, 0.4);
        }

        .logo-card img {
            height: 70px;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Main Container */
        .main-container {
            position: relative;
            z-index: 1;
            max-width: 550px;
            width: 100%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px 35px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: fadeInUp 1s ease 0.3s both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Title */
        .title-wrapper {
            text-align: center;
            margin-bottom: 35px;
            position: relative;
        }

        .title-wrapper::before {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, #fff, #ffd700, #fff);
            border-radius: 2px;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        h1 {
            color: #fff;
            font-size: 2.2rem;
            font-weight: 900;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            letter-spacing: 1px;
            line-height: 1.4;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
            margin-top: 10px;
            font-weight: 500;
        }

        /* Buttons */
        .buttons-wrapper {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .social-btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 18px 25px;
            border-radius: 16px;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
            border: none;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .social-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .social-btn:hover::before {
            left: 100%;
        }

        .social-btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .social-btn:active {
            transform: translateY(-2px) scale(0.98);
        }

        .social-btn i {
            font-size: 1.4rem;
            transition: transform 0.3s;
        }

        .social-btn:hover i {
            transform: rotate(360deg) scale(1.2);
        }

        .btn-number {
            position: absolute;
            left: 20px;
            background: rgba(255, 255, 255, 0.3);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 800;
            backdrop-filter: blur(5px);
        }

        /* Button Colors */
        .btn-1 {
            background: linear-gradient(135deg, #1877f2 0%, #0d5cb6 100%);
        }

        .btn-2 {
            background: linear-gradient(135deg, #4267B2 0%, #2b4c8c 100%);
        }

        .btn-3 {
            background: linear-gradient(135deg, #365899 0%, #1e3a6f 100%);
        }

        /* Footer */
        .footer {
            position: relative;
            z-index: 1;
            margin-top: 30px;
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.85rem;
            animation: fadeIn 1s ease 0.6s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .footer i {
            color: #ff6b6b;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            h1 { font-size: 1.6rem; }
            .main-container { padding: 30px 20px; }
            .social-btn { font-size: 1rem; padding: 16px 20px; }
            .logo-card img { height: 55px; }
            .logo-section { gap: 15px; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.5); border-radius: 4px; }
    </style>
</head>

<body>

    <!-- Floating Particles -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Logos -->
    <div class="logo-section">
    <div class="logo-card">
        <img src="GemecoLogo.jpg" alt="Gemeco">
    </div>
    <div class="logo-card">
        <img src="MIA.jpg" alt="MIA">
    </div>
    <div class="logo-card">
        <img src="hessa.jpg" alt="حصة وحقيبة">
    </div>
</div>

    <!-- Main Content -->
    <div class="main-container">
        <div class="title-wrapper">
            <h1>المنصات والروابط الرسميه</h1>
            <p class="subtitle">تابعونا على فيسبوك</p>
        </div>

        <div class="buttons-wrapper">
            <a class="social-btn btn-1" href="https://www.facebook.com/share/1LgSdqe1v3/" target="_blank">
                <span class="btn-number">1</span>
                <i class="fab fa-facebook-f"></i>
                <span>الرابط الأول</span>
            </a>

            <a class="social-btn btn-2" href="https://www.facebook.com/share/p/1BHaPuNnzB/" target="_blank">
                <span class="btn-number">2</span>
                <i class="fab fa-facebook-f"></i>
                <span>الرابط الثاني</span>
            </a>

            <a class="social-btn btn-3" href="https://www.facebook.com/share/1BWTEbYCMk/" target="_blank">
                <span class="btn-number">3</span>
                <i class="fab fa-facebook-f"></i>
                <span>الرابط الثالث</span>
            </a>
        </div>
    </div>

    <div class="footer">
    <p>
        للتواصل والاستفسار : <br>
        <span style="unicode-bidi:bidi-override; direction:ltr; display:inline-block;">
            +972 59-769-3294 <br>
            +972 59-717-8649
        </span>
    </p>
    <i class="fas fa-heart"></i>
</div>

</body>
</html>
